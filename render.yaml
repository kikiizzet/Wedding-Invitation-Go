services:
  - type: web
    name: wedding-invitation
    runtime: docker
    plan: free # Change to starter/pro for more resources
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wedding-db
          property: connectionString
      - key: PORT
        value: 8080
      - key: GIN_MODE
        value: release

databases:
  - name: wedding-db
    plan: free # Note: Render free databases are for testing and expire after 30 days. 
              # For "free forever", use Neon.tech or Supabase.
